apiVersion: druid.gardener.cloud/v1alpha1
kind: EtcdOpsTask
metadata:
  name: recover-from-quorum-loss
  namespace: default
spec:
  etcdName: etcd-main
  ttlSecondsAfterFinished: 3600
  config:
    recoverFromQuorumLoss:
      # scaleDownTimeout: how long to wait for the StatefulSet to scale down to 0.
      # Defaults to 60s. Accepts Go duration strings (e.g. 30s, 2m).
      scaleDownTimeout: 60s
      # podReadyTimeout: how long to wait for the single-member etcd pod (ordinal 0) to become ready after scale-up.
      # Defaults to 180s. Accepts Go duration strings (e.g. 2m, 5m).
      podReadyTimeout: 3m
