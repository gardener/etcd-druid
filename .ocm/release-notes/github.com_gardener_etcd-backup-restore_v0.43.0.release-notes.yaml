  category: breaking
  contents: Dropping the support of `failBelowRevision` feature as it seems to be
    no longer in usage for almost ~5years.
  mimetype: text/markdown
  reference: '[#1013](https://github.com/gardener/etcd-backup-restore/pull/1013)'
  type: standard
- audience: developer
  author:
    hostname: github.com
    type: githubUser
    username: shreyas-s-rao
  category: noteworthy
  contents: Migrate e2e tests from archived LocalStack community image to licensed
    `localstack/localstack:stable`. Running AWS e2e tests now requires a `LOCALSTACK_AUTH_TOKEN`
    environment variable.
  mimetype: text/markdown
  reference: '[#1014](https://github.com/gardener/etcd-backup-restore/pull/1014)'
