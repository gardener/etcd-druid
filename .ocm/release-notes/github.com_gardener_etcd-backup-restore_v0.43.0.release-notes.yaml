  author:
    hostname: github.com
    type: githubUser
    username: CaptainIRS
  category: noteworthy
  contents: A fallback mechanism is introduced for contacting the etcd cluster when
    the `--service-endpoints` flag is not specified.
  mimetype: text/markdown
  reference: '[#939](https://github.com/gardener/etcd-backup-restore/pull/939)'
  type: standard
